<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>MaxHub | Игры</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            font-family: system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .menu {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 32px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ffaa33;
        }
        .game-btn {
            background: linear-gradient(135deg, #00c6fb, #005bea);
            padding: 16px;
            margin: 12px 0;
            border-radius: 40px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .game-btn:active { transform: scale(0.97); }
        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>
    <div class="menu">
        <div class="title">🎮 MaxHub Games</div>
        <div class="game-btn" onclick="location.href='/blackjack'">🎲 Black Jack</div>
        <div class="game-btn" onclick="location.href='/slots'">🎰 MaxBandito</div>
        <div class="footer">By Jonathan ✨</div>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
    </script>
</body>
</html>
