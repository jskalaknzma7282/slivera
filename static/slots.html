<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>MaxBandito | Слот</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: linear-gradient(135deg, #2c1a0a 0%, #5a2e0a 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .game-container {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 24px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 2px solid #ffaa33;
        }
        .balance {
            text-align: center;
            margin-bottom: 20px;
            font-size: 20px;
            color: #ffaa33;
            font-weight: bold;
        }
        .balance span { font-size: 32px; color: #ffd966; }
        
        .slot-machine {
            background: #1a0f05;
            border-radius: 32px;
            padding: 20px;
            border: 3px solid #ffaa33;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        
        .reels {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .reel {
            background: #fff2e0;
            border-radius: 20px;
            padding: 15px 20px;
            text-align: center;
            width: 90px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            font-weight: bold;
            box-shadow: inset 0 0 0 2px #ffaa33, 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.1s ease;
        }
        
        .spinning {
            animation: spin 0.2s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }
        
        .paylines {
            background: #2a1a0a;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 20px;
            text-align: center;
            color: #ffaa66;
            font-size: 12px;
        }
        
        .bet-control {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            align-items: center;
            justify-content: center;
        }
        
        .bet-control input {
            background: #fff2e0;
            border: none;
            padding: 12px 16px;
            border-radius: 30px;
            font-size: 18px;
            width: 120px;
            text-align: center;
            font-weight: bold;
        }
        
        .spin-btn {
            background: linear-gradient(135deg, #ffaa33, #cc7700);
            border: none;
            padding: 14px 32px;
            border-radius: 40px;
            font-size: 24px;
            font-weight: bold;
            color: #2a1a0a;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .spin-btn:active { transform: scale(0.96); }
        .spin-btn:disabled { opacity: 0.5; transform: none; }
        
        .win-message {
            text-align: center;
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #ffaa33;
            text-shadow: 0 0 5px #ff6600;
        }
        
        .symbols-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            font-size: 12px;
            color: #ffaa66;
            flex-wrap: wrap;
        }
        
        .menu-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }
        
        .menu-buttons button {
            background: #ffaa33;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="balance">💰 БАЛАНС: <span id="balance">0</span> USDT</div>
    
    <div class="slot-machine">
        <div class="reels">
            <div class="reel" id="reel1">🍋</div>
            <div class="reel" id="reel2">🍒</div>
            <div class="reel" id="reel3">🍊</div>
        </div>
        
        <div class="paylines">
            🎰 ВЫИГРЫШНЫЕ КОМБИНАЦИИ 🎰<br>
            🍒🍒🍒 x10 | 🍊🍊🍊 x15 | 🍋🍋🍋 x20 | 7️⃣7️⃣7️⃣ x50 | 💀💀💀 x100
        </div>
        
        <div class="bet-control">
            <input type="number" id="betAmount" value="1" step="1" min="1">
            <button class="spin-btn" id="spinBtn">🎰 КРУТИТЬ</button>
        </div>
        
        <div class="win-message" id="winMessage"></div>
        
        <div class="symbols-info">
            <span>🍒 Вишня x10</span>
            <span>🍊 Апельсин x15</span>
            <span>🍋 Лимон x20</span>
            <span>7️⃣ Семерка x50</span>
            <span>💀 Бандито x100</span>
        </div>
    </div>
    
    <div class="menu-buttons">
        <button onclick="location.href='/blackjack'">🎲 Black Jack</button>
        <button onclick="location.href='/'">🏠 Главная</button>
    </div>
    
    <div class="footer">MaxBandito | By Jonathan ✨</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    
    let userId = tg.initDataUnsafe.user?.id;
    let balance = 0;
    let spinning = false;
    
    const symbols = ['🍒', '🍊', '🍋', '7️⃣', '💀'];
    const payouts = {
        '🍒🍒🍒': 10,
        '🍊🍊🍊': 15,
        '🍋🍋🍋': 20,
        '7️⃣7️⃣7️⃣': 50,
        '💀💀💀': 100
    };
    
    async function loadBalance() {
        if (!userId) return;
        try {
            let res = await fetch(`/api/balance?user_id=${userId}`);
            let data = await res.json();
            balance = data.balance;
            document.getElementById('balance').innerText = balance.toFixed(2);
        } catch(e) {
            balance = 10;
            document.getElementById('balance').innerText = '10.00';
        }
    }
    
    async function updateBalance(newBalance) {
        if (!userId) return;
        try {
            await fetch('/api/update_balance', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: userId, balance: newBalance})
            });
            balance = newBalance;
            document.getElementById('balance').innerText = balance.toFixed(2);
        } catch(e) { console.log(e); }
    }
    
    function getRandomSymbol() {
        return symbols[Math.floor(Math.random() * symbols.length)];
    }
    
    function calculateWin(s1, s2, s3) {
        const combo = `${s1}${s2}${s3}`;
        return payouts[combo] || 0;
    }
    
    async function spin() {
        if (spinning) return;
        
        let bet = parseFloat(document.getElementById('betAmount').value);
        if (isNaN(bet) || bet <= 0) {
            tg.showPopup({title: "Ошибка", message: "Введите сумму ставки", buttons: [{type: "ok"}]});
            return;
        }
        if (bet > balance) {
            tg.showPopup({title: "Ошибка", message: "Недостаточно средств", buttons: [{type: "ok"}]});
            return;
        }
        
        spinning = true;
        document.getElementById('spinBtn').disabled = true;
        document.getElementById('winMessage').innerHTML = '🎲 КРУТИМ... 🎲';
        
        await updateBalance(balance - bet);
        
        let reel1Elem = document.getElementById('reel1');
        let reel2Elem = document.getElementById('reel2');
        let reel3Elem = document.getElementById('reel3');
        
        reel1Elem.classList.add('spinning');
        reel2Elem.classList.add('spinning');
        reel3Elem.classList.add('spinning');
        
        let final1 = getRandomSymbol();
        let final2 = getRandomSymbol();
        let final3 = getRandomSymbol();
        
        let spins = 0;
        const maxSpins = 15;
        
        const interval = setInterval(() => {
            reel1Elem.innerHTML = getRandomSymbol();
            reel2Elem.innerHTML = getRandomSymbol();
            reel3Elem.innerHTML = getRandomSymbol();
            spins++;
            
            if (spins >= maxSpins) {
                clearInterval(interval);
                reel1Elem.innerHTML = final1;
                reel2Elem.innerHTML = final2;
                reel3Elem.innerHTML = final3;
                reel1Elem.classList.remove('spinning');
                reel2Elem.classList.remove('spinning');
                reel3Elem.classList.remove('spinning');
                
                let win = calculateWin(final1, final2, final3);
                
                if (win > 0) {
                    let winAmount = bet * win;
                    await updateBalance(balance + winAmount);
                    document.getElementById('winMessage').innerHTML = `🎉 ПОБЕДА! x${win} = +${winAmount.toFixed(2)} USDT 🎉`;
                } else {
                    document.getElementById('winMessage').innerHTML = `💔 ПРОИГРЫШ! -${bet.toFixed(2)} USDT 💔`;
                }
                
                spinning = false;
                document.getElementById('spinBtn').disabled = false;
                
                setTimeout(() => {
                    document.getElementById('winMessage').innerHTML = '';
                }, 3000);
            }
        }, 80);
    }
    
    document.getElementById('spinBtn').onclick = spin;
    loadBalance();
    setInterval(loadBalance, 5000);
</script>
</body>
</html>
